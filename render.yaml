# Render Blueprint - https://docs.render.com/blueprint-spec

services:
  - type: web
    name: sluff-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_PATH
        value: /app/data/sluff.db
      # HOST=0.0.0.0 is the production discriminator: it enables JSON-formatted
      # slog output and makes a missing JWT_SECRET fatal at startup.
      - key: HOST
        value: 0.0.0.0
      - key: CORS_ORIGINS
        sync: false
      - key: LITESTREAM_ENDPOINT
        sync: false
      - key: LITESTREAM_BUCKET
        sync: false
      - key: LITESTREAM_ACCESS_KEY_ID
        sync: false
      - key: LITESTREAM_SECRET_ACCESS_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DEFAULT_GUIDE_USERNAME
        sync: false
      - key: DEFAULT_GUIDE_PASSWORD
        sync: false

  - type: web
    name: sluff-frontend
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    rootDir: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
