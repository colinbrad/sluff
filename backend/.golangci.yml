version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - bodyclose
    - noctx
    - errorlint
    - unused
    - ineffassign
  settings:
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
            - "disableStutteringCheck"
        - name: var-naming
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: if-return
        - name: increment-decrement
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code
        - name: redefines-builtin-id
    gosec:
      excludes:
        - G101  # hardcoded credential false positives on env-var seeds
        - G104  # duplicated by errcheck
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - bodyclose
          - noctx
      # The Store interface does not thread context.Context; adding it is a
      # structural refactor that is out of scope for this pass.
      - path: internal/store/sqlite\.go
        linters:
          - noctx

formatters:
  enable:
    - gofumpt
